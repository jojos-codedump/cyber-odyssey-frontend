<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Cyber Odyssey 2.0</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="../../styles/auth.css">
    <style>
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9rem; }
        .form-group input, .form-group select { 
            width: 100%; padding: 10px; background: #111; border: 1px solid #333; 
            color: #fff; border-radius: 4px; font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--neon-cyan); outline: none; }
        
        fieldset { border: 1px solid #333; padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        legend { color: var(--neon-cyan); padding: 0 10px; font-size: 0.9rem; font-weight: bold; }
        
        .radio-group { display: flex; gap: 20px; margin-bottom: 15px; }
        .radio-group label { display: flex; align-items: center; gap: 8px; cursor: pointer; color: #fff; }
        .radio-group input[type="radio"] { width: auto; }

        select:disabled { opacity: 0.5; cursor: wait; }
    </style>
</head>
<body>
    <div class="auth-container" id="registration-portal">
        <div class="auth-card" style="max-width: 600px;">
            <div class="auth-header">
                <h2 class="glitch-text" data-text="PARTICIPANT REGISTRATION">PARTICIPANT REGISTRATION</h2>
                <p>Secure your node in the Cyber Odyssey 2.0 grid.</p>
            </div>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="event_id">Select Target Event</label>
                    <!--
                        This <select> is populated dynamically by registration.js on load.
                        The hardcoded options below are a FALLBACK only — shown when the
                        Render backend is sleeping and the API call times out.
                        registration.js owns ALL team-section visibility logic via a single
                        authoritative change listener. The inline <script> at the bottom of
                        this file has been intentionally removed to prevent duplicate listeners
                        fighting each other.
                    -->
                    <select id="event_id" required>
                        <option value="" disabled selected>Loading events...</option>
                        <option value="event_codeshield">CodeShield (7-Hour Hackathon)</option>
                        <option value="event_packet_hijackers">Packet Hijackers (CTF)</option>
                        <option value="event_cyber_visionary">Cyber Visionary (Ideathon)</option>
                        <option value="event_digital_dilemma">Digital Dilemma (Tech Debate)</option>
                        <option value="event_cyber_canvas">Cyber Canvas (Poster Gallery)</option>
                        <option value="event_guest_lecture">Guest Lecture</option>
                    </select>
                </div>

                <fieldset id="team-section" style="display: none;">
                    <legend>TEAM CONFIGURATION</legend>
                    <div class="radio-group">
                        <label><input type="radio" name="team_option" value="create" checked> Create New Team</label>
                        <label><input type="radio" name="team_option" value="join"> Join Existing Team</label>
                    </div>

                    <div id="create-team-ui">
                        <label for="team_name">New Team Name</label>
                        <input type="text" id="team_name" placeholder="e.g. NullSector">
                    </div>

                    <div id="join-team-ui" style="display: none;">
                        <label for="team_id">Existing Team ID</label>
                        <input type="text" id="team_id" placeholder="Paste ID from Team Lead">
                    </div>
                </fieldset>

                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" required placeholder="Enter your legal name">
                </div>

                <div class="form-group">
                    <label for="enrollment_number">University Enrollment Number</label>
                    <input type="text" id="enrollment_number" required placeholder="e.g. 1202300202xxxx">
                </div>
                
                <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                    <input type="checkbox" id="is_external" style="width: auto;">
                    <label for="is_external" style="margin-bottom: 0;">I am an external participant (Other College)</label>
                </div>

                <div class="form-group" id="university-name-wrapper" style="display: none;">
                    <label for="university_name">University Name</label>
                    <input type="text" id="university_name" value="University of Engineering & Management, Kolkata">
                </div>

                <div class="form-group">
                    <label for="department">Academic Department</label>
                    <input type="text" id="department" required placeholder="e.g. CSE (IoT, CS, BT)">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label for="academic_year">Year of Study</label>
                        <select id="academic_year" required>
                            <option value="1st">1st Year</option>
                            <option value="2nd">2nd Year</option>
                            <option value="3rd">3rd Year</option>
                            <option value="4th">4th Year</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="contact_number">Contact Number</label>
                        <input type="text" id="contact_number" required placeholder="+91">
                    </div>
                </div>

                <div class="form-group">
                    <label for="gmail">Gmail Address (For Digital ID)</label>
                    <input type="email" id="gmail" required placeholder="yourname@gmail.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Create Security Passcode</label>
                    <input type="password" id="password" required minlength="6" placeholder="Min 6 characters">
                </div>

                <button type="submit" id="submit-btn" class="btn-primary" style="width: 100%; margin-top: 20px;">
                    INITIALIZE REGISTRATION
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an identity? <a href="login.html">Access Grid</a></p>
            </div>
        </div>
    </div>

    <!--
        NOTE: The inline <script> block that previously lived here has been removed.
        It was attaching duplicate event listeners for the team-section toggle and the
        external-college checkbox — conflicting with the listeners in registration.js.
        All UI logic is now owned exclusively by registration.js (loaded below).
    -->
    <script type="module" src="../../scripts/events/registration.js"></script>
</body>
</html>
