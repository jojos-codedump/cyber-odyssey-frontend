<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeShield — Cyber Odyssey 2.0</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="../../styles/dashboards.css">
    <link rel="stylesheet" href="../../styles/codeshield.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        /* ═══════════════════════════════════════════════════════════
           CORE VARIABLES
        ═══════════════════════════════════════════════════════════ */
        :root {
            --c:      #00ffcc;
            --cdim:   rgba(0,255,204,0.08);
            --cglow:  rgba(0,255,204,0.4);
            --cmid:   rgba(0,255,204,0.22);
            --red:    #ff2b4e;
            --yel:    #ffcc00;
            --bg:     #020204;
            --glass:  rgba(4,4,10,0.80);
            --border: rgba(0,255,204,0.14);
            --dim:    #353850;
            --disp:   'Orbitron', monospace;
            --mono:   'Share Tech Mono', monospace;
            --total:  25200;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            font-family: var(--mono);
            color: var(--c);
            height: 100vh;
            overflow: hidden;
        }

        /* ── Matrix canvas ── */
        #matrix-canvas {
            position: fixed; inset: 0;
            z-index: 0; opacity: .2;
        }

        /* ── Animated grid ── */
        .bg-grid {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background-image:
                linear-gradient(rgba(0,255,204,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,204,0.03) 1px, transparent 1px);
            background-size: 42px 42px;
            animation: g-drift 22s linear infinite;
        }
        @keyframes g-drift {
            from { background-position: 0 0; }
            to   { background-position: 42px 42px; }
        }

        /* ── Vignette ── */
        .bg-vignette {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            background: radial-gradient(ellipse 80% 80% at 50% 50%,
                transparent 18%, rgba(2,2,4,0.74) 100%);
        }

        /* ── CRT scanlines ── */
        .bg-scan {
            position: fixed; inset: 0; z-index: 3; pointer-events: none;
            background: repeating-linear-gradient(
                to bottom, transparent 0, transparent 3px,
                rgba(0,0,0,0.05) 3px, rgba(0,0,0,0.05) 4px
            );
        }

        /* ── Corner brackets ── */
        .corner {
            position: fixed; z-index: 80;
            width: 32px; height: 32px;
            opacity: 0; animation: cfade 1.2s ease forwards .5s;
        }
        @keyframes cfade { to { opacity: .65; } }
        .c-tl { top:14px; left:14px; border-top:1px solid var(--c); border-left:1px solid var(--c); }
        .c-tr { top:14px; right:14px; border-top:1px solid var(--c); border-right:1px solid var(--c); }
        .c-bl { bottom:14px; left:14px; border-bottom:1px solid var(--c); border-left:1px solid var(--c); }
        .c-br { bottom:14px; right:14px; border-bottom:1px solid var(--c); border-right:1px solid var(--c); }

        /* ══════════════════════════════════════════════════
           TOPBAR
        ══════════════════════════════════════════════════ */
        .topbar {
            position: fixed; top:0; left:0; right:0; height:52px;
            background: var(--glass);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 0 24px; z-index: 100;
        }
        .topbar-brand {
            font-family: var(--disp);
            font-size: .74rem; font-weight: 700;
            letter-spacing: 4px; text-transform: uppercase;
            color: var(--c); text-shadow: 0 0 12px var(--cglow);
        }
        .topbar-brand::after { content:'_'; animation: blink .9s step-end infinite; }
        @keyframes blink { 50% { opacity:0; } }

        .topbar-center {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-size: .58rem; letter-spacing: 4px; color: var(--dim);
            text-transform: uppercase; white-space: nowrap;
        }
        .topbar-right { display: flex; align-items: center; gap: 18px; }

        .nav-back {
            font-size: .66rem; letter-spacing: 2px;
            color: var(--dim); text-decoration: none; text-transform: uppercase;
            transition: color .2s;
        }
        .nav-back:hover { color: var(--c); }

        .btn-exit {
            padding: 6px 15px;
            background: transparent;
            border: 1px solid rgba(255,43,78,.3);
            color: var(--red);
            font-family: var(--mono); font-size: .64rem;
            letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; border-radius: 3px;
            transition: background .2s, border-color .2s;
        }
        .btn-exit:hover { background: rgba(255,43,78,.1); border-color: var(--red); }

        /* ══════════════════════════════════════════════════
           STAGE
        ══════════════════════════════════════════════════ */
        .stage {
            position: fixed; inset: 52px 0 0 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10;
            padding: 14px 20px 18px;
            overflow: hidden;
        }

        /* staggered entry */
        .e { opacity: 0; animation: eup .65s ease forwards; }
        .e1 { animation-delay: .2s; }
        .e2 { animation-delay: .5s; }
        .e3 { animation-delay: .8s; }
        .e4 { animation-delay: 1.1s; }
        .e5 { animation-delay: 1.4s; }
        @keyframes eup {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Eyebrow ── */
        .eyebrow {
            font-size: .6rem; letter-spacing: 6px;
            color: var(--dim); text-transform: uppercase;
            margin-bottom: 12px;
        }

        /* ── Glitch headline ── */
        .headline {
            position: relative; display: inline-block;
            font-family: var(--disp);
            font-size: clamp(.85rem, 2.2vw, 1.35rem);
            font-weight: 700; color: #fff;
            letter-spacing: 8px; text-transform: uppercase;
            margin-bottom: 24px;
        }
        .headline::before, .headline::after {
            content: attr(data-text);
            position: absolute; inset: 0; color: #fff;
        }
        .headline::before {
            text-shadow: -2px 0 var(--red);
            clip-path: inset(22% 0 52% 0);
            animation: gl-t 7s infinite linear;
        }
        .headline::after {
            text-shadow: 2px 0 #0ff;
            clip-path: inset(63% 0 8% 0);
            animation: gl-b 7s infinite linear;
        }
        @keyframes gl-t {
            0%,76%,78%,100% { transform:none; clip-path:inset(22% 0 52% 0); }
            77% { transform:translate(-3px,-2px); clip-path:inset(4% 0 80% 0); }
        }
        @keyframes gl-b {
            0%,66%,68%,100% { transform:none; clip-path:inset(63% 0 8% 0); }
            67% { transform:translate(3px,2px); clip-path:inset(84% 0 2% 0); }
        }

        /* ══════════════════════════════════════════════════
           ARC RING
        ══════════════════════════════════════════════════ */
        .ring-wrap {
            position: relative; margin-bottom: 14px;
        }

        .ring-svg { display: block; transform: rotate(-90deg); overflow: visible; }

        .ring-inner {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            pointer-events: none;
        }

        /* ── Countdown display ── */
        #countdown-display {
            font-family: var(--disp);
            font-size: clamp(2.2rem, 8.5vw, 5.2rem);
            font-weight: 900;
            color: var(--c);
            letter-spacing: 3px; line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 16px var(--c), 0 0 42px rgba(0,255,204,.26);
            transition: color .4s, text-shadow .4s;
        }
        #countdown-display.warn {
            color: var(--yel);
            text-shadow: 0 0 16px var(--yel), 0 0 42px rgba(255,204,0,.26);
        }
        #countdown-display.crit {
            color: var(--red);
            text-shadow: 0 0 18px var(--red), 0 0 48px rgba(255,43,78,.3);
            animation: c-flicker 1.3s infinite;
        }
        @keyframes c-flicker {
            0%,100%{opacity:1} 91%{opacity:1} 92%{opacity:.3} 93%{opacity:1} 95%{opacity:.65} 96%{opacity:1}
        }

        .sep { display:inline-block; animation: sp .95s step-end infinite; }
        @keyframes sp { 50%{opacity:.12} }

        .disp-sub {
            font-size: .56rem; letter-spacing: 4px;
            color: var(--dim); text-transform: uppercase; margin-top: 8px;
        }

        /* ── Seg labels row ── */
        .seg-row {
            display: flex; font-size: .5rem; letter-spacing: 3px;
            color: var(--dim); text-transform: uppercase; margin-bottom: 14px;
        }
        .seg-row span { display: inline-block; text-align: center; }

        /* ══════════════════════════════════════════════════
           CONTROLS
        ══════════════════════════════════════════════════ */
        .controls {
            display: flex; gap: 10px; flex-wrap: wrap;
            justify-content: center; margin-bottom: 20px;
        }

        .ctrl {
            font-family: var(--disp); font-size: .64rem; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            padding: 11px 24px; border-radius: 3px;
            cursor: pointer; border: 1px solid;
            position: relative; overflow: hidden;
            transition: transform .2s, box-shadow .2s;
        }
        .ctrl::before {
            content: '';
            position: absolute; top:0; left:-100%;
            width: 55%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
            transition: left .45s;
        }
        .ctrl:hover::before { left: 160%; }
        .ctrl:hover { transform: translateY(-2px); }

        #btn-start {
            background: var(--c); color: #000; border-color: var(--c);
            box-shadow: 0 0 16px rgba(0,255,204,.22);
        }
        #btn-start:hover { box-shadow: 0 0 32px rgba(0,255,204,.5); }

        #btn-pause {
            display: none; background: transparent;
            color: var(--yel); border-color: rgba(255,204,0,.35);
        }
        #btn-pause:hover { background: rgba(255,204,0,.1); border-color: var(--yel); }

        #btn-reset {
            display: none; background: transparent;
            color: var(--red); border-color: rgba(255,43,78,.35);
        }
        #btn-reset:hover { background: rgba(255,43,78,.1); border-color: var(--red); }

        /* ══════════════════════════════════════════════════
           STATUS STRIP
        ══════════════════════════════════════════════════ */
        .sstrip {
            display: flex; align-items: center;
            gap: 22px; flex-wrap: wrap; justify-content: center;
        }
        .sit {
            display: flex; align-items: center; gap: 7px;
            font-size: .62rem; letter-spacing: 2px;
            color: var(--dim); text-transform: uppercase;
        }
        .sdot {
            width: 6px; height: 6px;
            border-radius: 50%; flex-shrink: 0;
        }
        .sdot.g { background:var(--c); box-shadow:0 0 6px var(--c); animation:dp 1.8s infinite; }
        .sdot.y { background:var(--yel); box-shadow:0 0 6px var(--yel); animation:dp 1.8s infinite; }
        .sdot.r { background:var(--red); box-shadow:0 0 6px var(--red); }
        @keyframes dp { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.6);opacity:.45} }
        .ssep { color: rgba(0,255,204,.1); }

        /* ══════════════════════════════════════════════════
           LOG PANEL (bottom-right)
        ══════════════════════════════════════════════════ */
        .log-panel {
            position: fixed; bottom:22px; right:22px;
            width: min(290px, calc(100vw - 36px));
            z-index: 50;
            opacity: 0; animation: eup .6s ease forwards 2.2s;
        }
        .log-hdr {
            font-size: .56rem; letter-spacing: 3px; color: var(--dim);
            text-transform: uppercase; margin-bottom: 6px;
            padding-bottom: 5px; border-bottom: 1px solid rgba(0,255,204,.06);
        }
        .log-entry {
            display: flex; gap: 8px; align-items: flex-start;
            padding: 6px 10px;
            background: rgba(4,4,10,.86);
            border: 1px solid rgba(0,255,204,.07);
            border-left: 2px solid var(--c);
            border-radius: 2px; margin-bottom: 5px;
            font-size: .62rem; letter-spacing: .5px;
            animation: ls .3s ease; backdrop-filter: blur(8px);
        }
        .log-entry.warn { border-left-color: var(--yel); }
        .log-entry.crit { border-left-color: var(--red); }
        @keyframes ls { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:none} }
        .log-ts  { color: rgba(0,255,204,.4); white-space:nowrap; flex-shrink:0; }
        .log-msg { color: #4e5270; }

        /* ══════════════════════════════════════════════════
           PROGRESS BAR (foot)
        ══════════════════════════════════════════════════ */
        .prog-wrap {
            position: fixed; bottom:0; left:0; right:0; height:2px; z-index:90;
        }
        #prog-fill {
            height: 100%; width:100%;
            background: var(--c); box-shadow: 0 0 8px var(--c);
            transform-origin: left;
            transition: transform 1s linear, background .4s, box-shadow .4s;
        }
        #prog-fill.warn { background:var(--yel); box-shadow:0 0 8px var(--yel); }
        #prog-fill.crit { background:var(--red);  box-shadow:0 0 8px var(--red); }

        /* ══════════════════════════════════════════════════
           SESSION-END OVERLAY
        ══════════════════════════════════════════════════ */
        #end-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.93);
            z-index: 500;
            display: none; flex-direction: column;
            align-items: center; justify-content: center; gap: 20px;
        }
        #end-overlay.show { display: flex; }
        .end-t {
            font-family: var(--disp);
            font-size: clamp(1.6rem,7.5vw,4.8rem);
            font-weight: 900; color: var(--red);
            letter-spacing: 8px; text-transform: uppercase;
            text-shadow: 0 0 28px var(--red), 0 0 58px rgba(255,43,78,.4);
            animation: ef 2.5s infinite;
        }
        @keyframes ef {
            0%,100%{opacity:1} 10%{opacity:.75} 11%{opacity:1}
            49%{opacity:1}     50%{opacity:.2}  51%{opacity:1}
        }
        .end-s {
            font-size: .72rem; letter-spacing: 4px;
            color: rgba(255,43,78,.5); text-transform: uppercase;
        }
        .end-btn {
            margin-top: 8px; padding:10px 28px;
            background: transparent;
            border: 1px solid rgba(255,43,78,.35); color: var(--red);
            font-family: var(--mono); font-size: .7rem;
            letter-spacing: 3px; text-transform: uppercase;
            cursor: pointer; border-radius: 3px;
            transition: background .2s;
        }
        .end-btn:hover { background: rgba(255,43,78,.12); }

        /* ── Particles ── */
        .pt {
            position: fixed; border-radius: 50%;
            pointer-events: none; z-index: 400;
        }

        /* ══════════════════════════════════════════════════
           RESPONSIVE
        ══════════════════════════════════════════════════ */
        @media (max-width: 520px) {
            .topbar { padding: 0 14px; }
            .topbar-center { display: none; }
            .corner { width: 20px; height: 20px; }
            .stage  { padding: 10px 12px 14px; }
            .headline { letter-spacing: 3px; }
            .ctrl { padding: 10px 16px; font-size: .58rem; letter-spacing: 2px; }
            .controls { gap: 8px; }
            .log-panel { display: none; }
            #countdown-display { letter-spacing: 2px; }
            .sstrip { gap: 14px; }
        }
        @media (max-height: 600px) {
            .eyebrow  { margin-bottom: 6px; }
            .headline { margin-bottom: 10px; }
            .ring-wrap { margin-bottom: 6px; }
            .seg-row  { margin-bottom: 8px; }
            .controls { margin-bottom: 12px; }
        }
    </style>
</head>
<body class="codeshield-theme">

    <!-- ── BG layers ── -->
    <canvas id="matrix-canvas"></canvas>
    <div class="bg-grid"></div>
    <div class="bg-vignette"></div>
    <div class="bg-scan"></div>

    <!-- ── Corner brackets ── -->
    <div class="corner c-tl"></div>
    <div class="corner c-tr"></div>
    <div class="corner c-bl"></div>
    <div class="corner c-br"></div>

    <!-- ── End overlay ── -->
    <div id="end-overlay">
        <div class="end-t">SYSTEM COMPROMISED</div>
        <div class="end-s">// 7-hour session terminated</div>
        <button class="end-btn" id="btn-end-reset">↺ Reset Console</button>
    </div>

    <!-- ── Topbar ── -->
    <header class="topbar">
        <span class="topbar-brand">CodeShield</span>
        <span class="topbar-center">// cyber_odyssey 2.0 — active session</span>
        <div class="topbar-right">
            <a href="../dashboards/admin.html" id="nav-back" class="nav-back">← back</a>
            <button id="logout-btn" class="btn-exit">Exit System</button>
        </div>
    </header>

    <!-- ── Log panel ── -->
    <div class="log-panel" id="log-panel">
        <div class="log-hdr">// event_log</div>
    </div>

    <!-- ── Stage ── -->
    <main class="stage">

        <p class="eyebrow e e1">// 7-Hour Hackathon — Live Control Console</p>

        <h1 class="headline e e2" data-text="SYSTEM COMPROMISE IN:">
            SYSTEM COMPROMISE IN:
        </h1>

        <!-- Ring -->
        <div class="ring-wrap e e3" id="ring-wrap">
            <svg class="ring-svg" id="ring-svg" xmlns="http://www.w3.org/2000/svg"></svg>
            <div class="ring-inner">
                <div id="countdown-display">07<span class="sep">:</span>00<span class="sep">:</span>00</div>
                <div class="disp-sub" id="disp-sub">awaiting ignition</div>
            </div>
        </div>

        <!-- Seg labels -->
        <div class="seg-row e e3" id="seg-row"></div>

        <!-- Controls -->
        <div class="controls e e4">
            <button id="btn-start" class="ctrl">⚡ Initiate Hackathon</button>
            <button id="btn-pause" class="ctrl">⏸ Pause</button>
            <button id="btn-reset" class="ctrl">↺ Override / Reset</button>
        </div>

        <!-- Status strip -->
        <div class="sstrip e e5">
            <div class="sit">
                <div class="sdot g" id="net-dot"></div>
                <span id="net-lbl">Network Secure</span>
            </div>
            <span class="ssep">|</span>
            <div class="sit">
                <div class="sdot y"></div>
                <span>Monitoring 150 Nodes</span>
            </div>
            <span class="ssep">|</span>
            <div class="sit">
                <div class="sdot g" id="tmr-dot"></div>
                <span id="tmr-lbl">Timer: Standby</span>
            </div>
        </div>

    </main>

    <!-- ── Progress bar ── -->
    <div class="prog-wrap"><div id="prog-fill"></div></div>

    <!-- ══════════════════════════════════════════════════════
         AUTH SCRIPT
    ══════════════════════════════════════════════════════ -->
    <script type="module">
        import { monitorAuthState, logoutUser } from '../../scripts/auth/auth-handler.js';
        monitorAuthState(true, ['Admin', 'Volunteer', 'Judge']);

        const role = sessionStorage.getItem('userRole');
        const back = document.getElementById('nav-back');
        if (role === 'Volunteer') back.href = '../dashboards/volunteer.html';
        if (role === 'Judge')     back.href = '../dashboards/judge.html';
        document.getElementById('logout-btn').addEventListener('click', logoutUser);

        if (role === 'Judge') {
            ['btn-start','btn-pause','btn-reset'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = 'none';
            });
        }
    </script>

    <!-- ══════════════════════════════════════════════════════
         VISUALS + BRIDGE (matrix, ring, logs, particles)
    ══════════════════════════════════════════════════════ -->
    <script>
    (() => {
        const TOTAL = 25200;

        /* ── Matrix rain ─────────────────────────── */
        const cv  = document.getElementById('matrix-canvas');
        const ctx = cv.getContext('2d');
        const CHS = '01アイウエオカキクケコサシスセソタチツテトナニヌ<>/\\{}|#$%!?@&';
        const FS  = 13;
        let drops = [];
        function rz() {
            cv.width = innerWidth; cv.height = innerHeight;
            drops = Array.from(
                { length: Math.ceil(cv.width / FS) },
                () => Math.floor(Math.random() * -cv.height / FS)
            );
        }
        rz(); addEventListener('resize', rz, { passive: true });
        function drawMx() {
            ctx.fillStyle = 'rgba(2,2,4,.054)';
            ctx.fillRect(0, 0, cv.width, cv.height);
            ctx.font = FS + "px 'Share Tech Mono',monospace";
            drops.forEach((y, i) => {
                const c = CHS[Math.floor(Math.random() * CHS.length)];
                ctx.fillStyle = y <= 1 ? '#fff'
                    : `rgba(0,255,204,${.1 + Math.random() * .45})`;
                ctx.fillText(c, i * FS, y * FS);
                if (y * FS > cv.height && Math.random() > .975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMx, 48);

        /* ── Ring builder ────────────────────────── */
        const rw  = document.getElementById('ring-wrap');
        const rs  = document.getElementById('ring-svg');
        let R = 0, CIRC = 0, CX = 0, CY = 0;

        function buildRing() {
            const vw = innerWidth, vh = innerHeight - 52;
            const dim = Math.round(Math.min(vw * .7, vh * .52, 370));
            R = dim * .435; CIRC = 2 * Math.PI * R;
            CX = CY = dim / 2;
            rs.setAttribute('width', dim); rs.setAttribute('height', dim);
            rs.setAttribute('viewBox', `0 0 ${dim} ${dim}`);
            rs.innerHTML = '';

            // ticks
            for (let i = 0; i < 60; i++) {
                const a = i / 60 * 2 * Math.PI;
                const major = i % 5 === 0;
                const ri = major ? R - 9 : R - 5, ro = R + 2;
                const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                ln.setAttribute('x1', CX + ri * Math.cos(a));
                ln.setAttribute('y1', CY + ri * Math.sin(a));
                ln.setAttribute('x2', CX + ro * Math.cos(a));
                ln.setAttribute('y2', CY + ro * Math.sin(a));
                ln.setAttribute('stroke', major ? 'rgba(0,255,204,.28)' : 'rgba(0,255,204,.08)');
                ln.setAttribute('stroke-width', major ? '1.5' : '1');
                rs.appendChild(ln);
            }

            // glow halo
            const glow = mkCirc('arc-glow', { r: R, stroke:'rgba(0,255,204,.1)', sw:12 });
            glow.style.cssText = `stroke-dasharray:${CIRC};stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .4s;`;
            rs.appendChild(glow);

            // track
            rs.appendChild(mkCirc('arc-track', { r: R, stroke:'rgba(0,255,204,.055)', sw:3 }));

            // fill
            const fill = mkCirc('arc-fill', { r: R, stroke:'#00ffcc', sw:4, linecap:'round' });
            fill.style.cssText = `stroke-dasharray:${CIRC};stroke-dashoffset:0;
                transition:stroke-dashoffset 1s linear,stroke .4s,filter .4s;
                filter:drop-shadow(0 0 5px #00ffcc) drop-shadow(0 0 12px rgba(0,255,204,.45));`;
            rs.appendChild(fill);

            // tip dot
            const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            dot.setAttribute('id', 'arc-dot');
            dot.setAttribute('r', '5');
            dot.setAttribute('fill', '#00ffcc');
            dot.style.cssText = 'filter:drop-shadow(0 0 4px #00ffcc);transition:fill .4s,filter .4s;';
            rs.appendChild(dot);
            moveDot(0);

            // seg labels
            const sr = document.getElementById('seg-row');
            if (sr) sr.innerHTML =
                `<span style="width:2.5ch">HRS</span>
                 <span style="width:.8ch"></span>
                 <span style="width:2.5ch">MIN</span>
                 <span style="width:.8ch"></span>
                 <span style="width:2.5ch">SEC</span>`;
        }

        function mkCirc(id, { r, stroke, sw, linecap }) {
            const el = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            el.setAttribute('id', id);
            el.setAttribute('cx', CX); el.setAttribute('cy', CY); el.setAttribute('r', r);
            el.setAttribute('fill', 'none');
            el.setAttribute('stroke', stroke);
            el.setAttribute('stroke-width', sw);
            if (linecap) el.setAttribute('stroke-linecap', linecap);
            return el;
        }

        function moveDot(offset) {
            const dot = document.getElementById('arc-dot');
            if (!dot) return;
            const frac = 1 - offset / CIRC;
            const ang  = frac * 2 * Math.PI - Math.PI / 2;
            dot.setAttribute('cx', CX + R * Math.cos(ang));
            dot.setAttribute('cy', CY + R * Math.sin(ang));
        }

        buildRing();
        addEventListener('resize', buildRing, { passive: true });

        /* ── Log feed ────────────────────────────── */
        const lp = document.getElementById('log-panel');
        window._addLog = (msg, level) => {
            const ts = new Date().toLocaleTimeString('en-IN', { hour12: false });
            const el = document.createElement('div');
            el.className = 'log-entry' + (level ? ' ' + level : '');
            el.innerHTML = `<span class="log-ts">${ts}</span><span class="log-msg">${msg}</span>`;
            lp.insertBefore(el, lp.querySelector('.log-hdr').nextSibling);
            const all = lp.querySelectorAll('.log-entry');
            if (all.length > 5) all[all.length - 1].remove();
        };
        window._addLog('Console online. Awaiting ignition.');

        /* ── Arc update (called by codeshield-ui.js) */
        window._updateArc = (rem) => {
            const fill = document.getElementById('arc-fill');
            const glow = document.getElementById('arc-glow');
            const dot  = document.getElementById('arc-dot');
            const disp = document.getElementById('countdown-display');
            const prog = document.getElementById('prog-fill');
            if (!fill) return;

            const frac = Math.max(0, Math.min(1, rem / TOTAL));
            const off  = CIRC * (1 - frac);
            fill.style.strokeDashoffset = off;
            glow.style.strokeDashoffset = off;
            moveDot(off);
            if (prog) prog.style.transform = `scaleX(${frac})`;

            const nd  = document.getElementById('net-dot');
            const td  = document.getElementById('tmr-dot');
            const nl  = document.getElementById('net-lbl');
            const tl  = document.getElementById('tmr-lbl');
            const sub = document.getElementById('disp-sub');

            function cls(el, c) {
                el.classList.remove('warn','crit');
                if (c) el.classList.add(c);
            }
            function dotCls(el, c) {
                el.classList.remove('g','y','r');
                el.classList.add(c);
            }

            if (rem <= 0) {
                [fill,glow,dot,disp,prog].forEach(e => e && cls(e,'crit'));
                if (nd)  dotCls(nd,'r');
                if (td)  dotCls(td,'r');
                nl.textContent  = 'System Compromised';
                tl.textContent  = 'Timer: TERMINATED';
                sub.textContent = 'session over';
                document.getElementById('end-overlay').classList.add('show');
                window._addLog('SESSION EXPIRED — system compromised.', 'crit');
            } else if (rem <= 1800) {
                [fill,glow,dot,disp,prog].forEach(e => e && cls(e,'crit'));
                if (nd)  dotCls(nd,'r');
                if (td)  dotCls(td,'r');
                nl.textContent = 'CRITICAL — Final Phase';
                tl.textContent = 'Timer: Critical';
            } else if (rem <= 5400) {
                [fill,glow,dot,disp,prog].forEach(e => e && cls(e,'warn'));
                if (nd)  dotCls(nd,'y');
                nl.textContent = 'Warning — Mid Phase';
                tl.textContent = 'Timer: Warning';
            } else {
                [fill,glow,dot,disp,prog].forEach(e => e && cls(e,null));
                if (nd)  dotCls(nd,'g');
                if (td)  dotCls(td,'g');
                tl.textContent = 'Timer: Running';
            }
        };

        /* ── Particles ───────────────────────────── */
        window._burstParticles = (col = '#00ffcc') => {
            const cx = innerWidth / 2, cy = innerHeight / 2;
            for (let i = 0; i < 50; i++) {
                const p   = document.createElement('div');
                p.className = 'pt';
                const ang  = Math.random() * 2 * Math.PI;
                const dist = 60 + Math.random() * 230;
                const sz   = 2 + Math.random() * 3;
                const dur  = 500 + Math.random() * 700;
                p.style.cssText = `
                    left:${cx}px;top:${cy}px;
                    width:${sz}px;height:${sz}px;
                    background:${Math.random() > .4 ? col : '#fff'};
                    box-shadow:0 0 6px ${col};
                    transition:transform ${dur}ms ease,opacity ${dur}ms ease;
                    opacity:1;
                `;
                document.body.appendChild(p);
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    p.style.transform = `translate(${Math.cos(ang)*dist}px,${Math.sin(ang)*dist}px)`;
                    p.style.opacity = '0';
                }));
                setTimeout(() => p.remove(), dur + 60);
            }
        };

        /* ── Button hooks ────────────────────────── */
        document.getElementById('btn-start').addEventListener('click', () => {
            window._burstParticles('#00ffcc');
            document.getElementById('tmr-lbl').textContent  = 'Timer: Running';
            document.getElementById('disp-sub').textContent = 'session live';
            window._addLog('Hackathon INITIATED — 7-hour clock started.');
        });
        document.getElementById('btn-pause').addEventListener('click', () => {
            document.getElementById('tmr-lbl').textContent  = 'Timer: Paused';
            document.getElementById('disp-sub').textContent = 'paused';
            window._addLog('Clock PAUSED by operator.', 'warn');
        });

        const doReset = () => {
            document.getElementById('end-overlay').classList.remove('show');
            const ids = ['arc-fill','arc-glow','arc-dot',
                         'countdown-display','prog-fill'];
            ids.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove('warn','crit');
            });
            const fill = document.getElementById('arc-fill');
            const glow = document.getElementById('arc-glow');
            const prog = document.getElementById('prog-fill');
            if (fill) fill.style.strokeDashoffset = 0;
            if (glow) glow.style.strokeDashoffset = 0;
            if (prog) prog.style.transform = 'scaleX(1)';
            moveDot(0);
            const nd = document.getElementById('net-dot');
            const td = document.getElementById('tmr-dot');
            if (nd) { nd.classList.remove('y','r'); nd.classList.add('g'); }
            if (td) { td.classList.remove('y','r'); td.classList.add('g'); }
            document.getElementById('net-lbl').textContent  = 'Network Secure';
            document.getElementById('tmr-lbl').textContent  = 'Timer: Standby';
            document.getElementById('disp-sub').textContent = 'awaiting ignition';
            window._addLog('System RESET by operator.', 'crit');
            window._burstParticles('#ff2b4e');
        };
        document.getElementById('btn-reset').addEventListener('click', doReset);
        document.getElementById('btn-end-reset').addEventListener('click', doReset);

    })();
    </script>

    <!-- ── Timer engine (Firebase sync + button logic) ── -->
    <script type="module" src="../../scripts/events/codeshield-ui.js"></script>

</body>
</html>
