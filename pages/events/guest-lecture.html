<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Lecture - Cyber Odyssey 2.0</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="../../styles/dashboards.css">
    <style>
        .roster-table-wrap { overflow-x: auto; }

        .mgmt-table { width: 100%; border-collapse: collapse; color: #aaa; font-family: monospace; font-size: 0.9rem; }
        .mgmt-table th { text-align: left; padding: 12px; border-bottom: 1px solid #333; color: #fff; }
        .mgmt-table td { padding: 12px; border-bottom: 1px dashed #222; }
        .mgmt-table tr:hover { background: rgba(255, 255, 255, 0.03); }

        .badge-cyan { color: #00ffcc; border: 1px solid #00ffcc; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; }
        .badge-present { color: #39ff14; border-color: #39ff14; }
        .badge-pending { color: #888; border-color: #555; }

        .controls-bar { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .controls-bar input {
            flex-grow: 1; max-width: 400px; padding: 10px;
            background: #1a1a1a; border: 1px solid #333; color: #fff;
            font-family: monospace; border-radius: 4px;
        }
        .controls-bar input:focus { border-color: var(--neon-cyan); outline: none; }

        .stat-strip {
            display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap;
        }
        .stat-pill {
            background: #111; border: 1px solid #333; border-radius: 6px;
            padding: 15px 25px; text-align: center; flex: 1; min-width: 120px;
        }
        .stat-pill .num { font-size: 2rem; font-weight: bold; color: #00ffcc; }
        .stat-pill .label { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
    </style>
</head>
<body style="background-color: #050505;">

    <div class="dashboard-container">
        <aside class="sidebar">
            <h2 style="color: #00ffcc;">Cyber Odyssey</h2>
            <nav>
                <ul id="nav-links">
                    <li><a href="#" class="active">Attendee Roster</a></li>
                    <li id="nav-back"><a href="../dashboards/admin.html">← Back to Overview</a></li>
                </ul>
            </nav>
            <button id="logout-btn" class="btn-logout">Exit System</button>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header">
                <div>
                    <h1 style="color: #00ffcc; margin-bottom: 5px;">Guest Lecture</h1>
                    <p style="color: #888; font-family: monospace;">ATTENDEE DIRECTORY & CHECK-IN STATUS</p>
                </div>
                <div style="text-align: right;">
                    <span id="role-indicator"
                          style="background: #111; padding: 5px 10px; border: 1px solid #333;
                                 border-radius: 5px; color: #aaa; font-size: 0.8rem;"></span>
                </div>
            </header>

            <!-- Live Stats Strip -->
            <div class="stat-strip">
                <div class="stat-pill">
                    <div class="num" id="stat-total">–</div>
                    <div class="label">Registered</div>
                </div>
                <div class="stat-pill">
                    <div class="num" id="stat-present" style="color: #39ff14;">–</div>
                    <div class="label">Present</div>
                </div>
                <div class="stat-pill">
                    <div class="num" id="stat-pending" style="color: #888;">–</div>
                    <div class="label">Pending</div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls-bar">
                <input type="text" id="search-box" placeholder="Search by name, email, or enrollment number...">
                <button class="btn-primary" id="btn-refresh">REFRESH ROSTER</button>
            </div>

            <!-- Roster Table -->
            <div class="roster-table-wrap">
                <table class="mgmt-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Enrollment No.</th>
                            <th>Department / Year</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="roster-body">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #555;">
                                Initializing attendee directory...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module">
        import { monitorAuthState, logoutUser } from '../../scripts/auth/auth-handler.js';
        import { apiClient } from '../../scripts/api/api-client.js';

        monitorAuthState(true, ['Admin', 'Volunteer']);

        const role          = sessionStorage.getItem('userRole');
        const assignedEvent = sessionStorage.getItem('assignedEvent');

        // Volunteers not assigned to guest lecture shouldn't be here
        if (role === 'Volunteer' && assignedEvent && assignedEvent !== 'event_guest_lecture') {
            alert('ACCESS DENIED: You are not assigned to this module.');
            window.location.href = '../dashboards/volunteer.html';
        }

        document.getElementById('role-indicator').innerText = `ACCESS: ${role.toUpperCase()}`;

        // Back-link is role-aware
        if (role === 'Volunteer') {
            document.querySelector('#nav-back a').href = '../dashboards/volunteer.html';
        }

        // ─────────────────────────────────────────────────────────────
        // Roster
        // ─────────────────────────────────────────────────────────────
        let fullRoster = [];

        async function loadRoster() {
            const tbody = document.getElementById('roster-body');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#00ffcc;">Syncing with grid...</td></tr>';

            try {
                fullRoster = await apiClient.fetchEventRoster('event_guest_lecture');
                renderRoster(fullRoster);
                updateStats(fullRoster);
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="5" style="color:#ff4444;text-align:center;">
                    API ERROR: ${err.message}
                </td></tr>`;
            }
        }

        function renderRoster(data) {
            const tbody = document.getElementById('roster-body');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#555;">No attendees registered yet.</td></tr>';
                return;
            }

            data.forEach(p => {
                const isPresent = p.attendance_status === 'Present';
                const badge     = isPresent
                    ? '<span class="badge-cyan badge-present">PRESENT</span>'
                    : '<span class="badge-cyan badge-pending">PENDING</span>';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong style="color:#fff;">${p.full_name || '–'}</strong></td>
                    <td>${p.gmail || '–'}</td>
                    <td style="color:#aaa;">${p.enrollment_number || '–'}</td>
                    <td>${p.department || '–'} (Yr ${p.academic_year || '–'})</td>
                    <td>${badge}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateStats(data) {
            const total   = data.length;
            const present = data.filter(p => p.attendance_status === 'Present').length;
            document.getElementById('stat-total').innerText   = total;
            document.getElementById('stat-present').innerText = present;
            document.getElementById('stat-pending').innerText = total - present;
        }

        // ─────────────────────────────────────────────────────────────
        // Search filter
        // ─────────────────────────────────────────────────────────────
        document.getElementById('search-box').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = fullRoster.filter(p =>
                (p.full_name         && p.full_name.toLowerCase().includes(q))         ||
                (p.gmail             && p.gmail.toLowerCase().includes(q))             ||
                (p.enrollment_number && p.enrollment_number.toLowerCase().includes(q))
            );
            renderRoster(filtered);
        });

        document.getElementById('btn-refresh').onclick = loadRoster;
        document.getElementById('logout-btn').onclick  = logoutUser;

        // Boot
        loadRoster();
    </script>
</body>
</html>
